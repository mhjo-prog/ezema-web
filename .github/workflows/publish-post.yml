name: Publish Approved Posts

on:
  schedule:
    # 10분마다 실행: scheduled_at 도달한 approved 포스트를 published로 전환
    - cron: "*/10 * * * *"
  workflow_dispatch:
    inputs:
      action:
        description: "실행할 작업"
        required: true
        default: "publish"
        type: choice
        options:
          - publish

jobs:
  # scheduled_at <= now() 인 approved 포스트를 published로 전환
  publish-approved:
    if: >
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'publish') ||
      github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci --prefix scripts

      - name: Publish approved posts
        run: npm run publish-approved
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
