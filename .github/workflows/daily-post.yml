name: Daily Sasang Post

on:
  schedule:
    # 08:00 KST (UTC 23:00 전날) - 트렌드 수집
    - cron: "0 23 * * *"
    # 08:30 KST (UTC 23:30 전날) - 트렌드 반영 글 생성
    - cron: "30 23 * * *"
    # 09:30 KST (UTC 00:30) - approved → published 전환
    - cron: "30 0 * * *"
  workflow_dispatch:
    inputs:
      action:
        description: "실행할 작업"
        required: true
        default: "generate"
        type: choice
        options:
          - collect
          - generate
          - publish

jobs:
  # ── 08:00 KST: 트렌드 수집 ──────────────────────────────────────────
  collect-trends:
    if: >
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'collect') ||
      (github.event_name == 'schedule' && github.event.schedule == '0 23 * * *')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci --prefix scripts

      - name: Collect trends
        run: node scripts/collect-trends.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}

  # ── 08:30 KST: 트렌드 반영 글 생성 ─────────────────────────────────
  generate-post:
    if: >
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'generate') ||
      (github.event_name == 'schedule' && github.event.schedule == '30 23 * * *')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci --prefix scripts

      - name: Generate daily post
        run: node scripts/generate-post.js
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}

  # ── 09:30 KST: approved → published 전환 ────────────────────────────
  publish-approved:
    if: >
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'publish') ||
      (github.event_name == 'schedule' && github.event.schedule == '30 0 * * *')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci --prefix scripts

      - name: Publish approved posts
        run: node scripts/publish-approved.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
