name: Daily Sasang Post

on:
  schedule:
    # 08:00 KST (UTC 23:00 전날) - 트렌드 수집
    - cron: "0 23 * * *"
    # 08:30 KST (UTC 23:30 전날) - 트렌드 반영 글 생성
    - cron: "30 23 * * *"
  workflow_dispatch:
    inputs:
      action:
        description: "실행할 작업"
        required: true
        default: "generate"
        type: choice
        options:
          - collect
          - generate

jobs:
  # ── 08:00 KST: 트렌드 수집 ──────────────────────────────────────────
  collect-trends:
    if: >
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'collect') ||
      (github.event_name == 'schedule' && github.event.schedule == '0 23 * * *')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci --prefix scripts

      - name: Create .env
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> .env
          echo "SUPABASE_SERVICE_KEY=${{ secrets.SUPABASE_SERVICE_KEY }}" >> .env
          echo "NAVER_CLIENT_ID=${{ secrets.NAVER_CLIENT_ID }}" >> .env
          echo "NAVER_CLIENT_SECRET=${{ secrets.NAVER_CLIENT_SECRET }}" >> .env

      - name: Collect trends
        run: npm run collect-trends

  # ── 08:30 KST: 트렌드 반영 글 생성 ─────────────────────────────────
  generate-post:
    if: >
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'generate') ||
      (github.event_name == 'schedule' && github.event.schedule == '30 23 * * *')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci --prefix scripts

      - name: Create .env
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> .env
          echo "SUPABASE_SERVICE_KEY=${{ secrets.SUPABASE_SERVICE_KEY }}" >> .env
          echo "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}" >> .env
          echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> .env

      - name: Generate daily post
        run: npm run generate-post

